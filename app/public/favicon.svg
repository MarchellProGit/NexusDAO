<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="nexusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <polygon points="50,10 90,30 90,70 50,90 10,70 10,30" 
           fill="none" 
           stroke="url(#nexusGrad)" 
           stroke-width="6" 
           filter="url(#glow)"/>
           
  <circle cx="50" cy="50" r="15" fill="#3b82f6" filter="url(#glow)"/>
  
  <line x1="50" y1="50" x2="50" y2="10" stroke="#8b5cf6" stroke-width="4" opacity="0.6"/>
  <line x1="50" y1="50" x2="15" y2="70" stroke="#8b5cf6" stroke-width="4" opacity="0.6"/>
  <line x1="50" y1="50" x2="85" y2="70" stroke="#8b5cf6" stroke-width="4" opacity="0.6"/>
</svg>